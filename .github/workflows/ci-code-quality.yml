name: Code Quality Flow
on:
    workflow_call:
        inputs:
            GO_SDK:
                required: true
                type: string
            GOSEC_PARAMS:
                required: true
                type: string
                default: ""

jobs:
    golangci-lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source 🫳🏼
              uses: actions/checkout@v6.0.2
            - name: Setup Go ⚙️
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ inputs.GO_SDK }}
            - name: GolangCI Lint 🔍
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.10

    secret-scanner:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source 🫳🏼
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
            - name: Secret Scanner 🔍
              uses: gitleaks/gitleaks-action@v2.3.9
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    dependency-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source 🫳🏼
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
            - name: OSV Dependency Scan 🔍
              uses: google/osv-scanner-action@v2.3.3
              with:
                  scan-args: |-
                      --recursive
                      --output sbom-cyclonedx.json
                      ./
            - name: OSV Cyclone DX 🔍
              uses: google/osv-scanner-action@v2.3.3
              with:
                  scan-args: |-
                      --format cyclonedx
                      --recursive
                      --output sbom-cyclonedx.json
                      ./

    gosec:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source 🫳🏼
              uses: actions/checkout@v6.0.2
            - name: Gosec Scanner 🔍
              uses: securego/gosec@v2.25.0
              with:
                  args: "${{ inputs.GOSEC_PARAMS}}./..."
